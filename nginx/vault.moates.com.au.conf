# Vault (Vaultwarden) vhost — APPEND to the existing nginx-proxy-prod template:
#   /root/gym_junkie_server/nginx/nginx.conf.template
# Reuses the existing wildcard Cloudflare Origin cert (*.moates.com.au).
# Follows the same resolver + `set $upstream` pattern as the chat/mcp blocks so
# nginx keeps serving the other sites even if the vault container is down.

# Redirect HTTP -> HTTPS (Cloudflare also does this, but keep parity with siblings)
server {
	listen 80;
	server_name vault.moates.com.au;
	return 301 https://$server_name$request_uri;
}

server {
	listen 443 ssl http2;
	server_name vault.moates.com.au;

	ssl_certificate /etc/nginx/ssl/cloudflare-cert.pem;
	ssl_certificate_key /etc/nginx/ssl/cloudflare-key.pem;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
	ssl_prefer_server_ciphers on;

	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header X-Content-Type-Options "nosniff" always;

	# Allow large attachment uploads (Bitwarden item attachments/sends).
	client_max_body_size 128M;

	location / {
	    # Resolve the upstream at request time via Docker's embedded DNS so
	    # nginx still starts (and the other sites stay up) even if vault is down.
	    resolver 127.0.0.11 valid=30s;
	    set $vw_upstream http://vaultwarden:80;
	    proxy_pass $vw_upstream;

	    proxy_http_version 1.1;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	    proxy_set_header X-Forwarded-Proto $scheme;

	    # WebSocket notifications (Bitwarden live sync).
	    proxy_set_header Upgrade $http_upgrade;
	    proxy_set_header Connection "upgrade";
	    proxy_read_timeout 3600s;
	}
}
