# >>> vaultwarden vhost >>>  (managed block — the deploy script replaces everything between these markers)
# Vault (Vaultwarden) vhost for the existing nginx-proxy-prod.
# Reuses the wildcard Cloudflare Origin cert (*.moates.com.au) and follows the
# siblings' resolver + `set $upstream` pattern so nginx keeps serving the other
# sites even if the vault container is down. Recovers the real client IP from
# Cloudflare (real_ip) so rate-limiting keys on the real client, not the edge.
#
# NOTE on protection layers: because this service is Dockerised (published ports
# are DNAT'd past the INPUT chain) AND Cloudflare-proxied (packet source is the
# CF edge, real client only in CF-Connecting-IP), an iptables fail2ban jail
# cannot correctly ban HTTP offenders here. The right controls are nginx
# rate-limiting on the real IP (below), the Cloudflare-only origin lock (below)
# and/or a Cloudflare rate-limit rule. fail2ban is still used for sshd.

# Brute-force limiter for the admin panel, keyed on the real client IP.
limit_req_zone $binary_remote_addr zone=vault_admin:10m rate=6r/m;

# --- Origin lock: only allow requests that actually arrived via Cloudflare. ---
# Evaluated against $realip_remote_addr, i.e. the ORIGINAL TCP peer (the CF edge)
# BEFORE the real_ip module rewrites $remote_addr to the visitor. This blocks
# anyone hitting the droplet's raw IP directly, bypassing Cloudflare's WAF and
# rate-limits. (Ranges snapshot 2026-07-22; keep in sync with set_real_ip_from.)
geo $realip_remote_addr $vault_from_cloudflare {
	default 0;
	173.245.48.0/20 1;
	103.21.244.0/22 1;
	103.22.200.0/22 1;
	103.31.4.0/22 1;
	141.101.64.0/18 1;
	108.162.192.0/18 1;
	190.93.240.0/20 1;
	188.114.96.0/20 1;
	197.234.240.0/22 1;
	198.41.128.0/17 1;
	162.158.0.0/15 1;
	104.16.0.0/13 1;
	104.24.0.0/14 1;
	172.64.0.0/13 1;
	131.0.72.0/22 1;
	2400:cb00::/32 1;
	2606:4700::/32 1;
	2803:f800::/32 1;
	2405:b500::/32 1;
	2405:8100::/32 1;
	2a06:98c0::/29 1;
	2c0f:f248::/32 1;
}

# Redirect HTTP -> HTTPS
server {
	listen 80;
	server_name vault.moates.com.au;
	return 301 https://$server_name$request_uri;
}

server {
	listen 443 ssl http2;
	server_name vault.moates.com.au;

	# Origin lock: reject anything that did not come through Cloudflare.
	if ($vault_from_cloudflare = 0) { return 403; }

	ssl_certificate /etc/nginx/ssl/cloudflare-cert.pem;
	ssl_certificate_key /etc/nginx/ssl/cloudflare-key.pem;
	ssl_protocols TLSv1.2 TLSv1.3;
	ssl_ciphers HIGH:!aNULL:!MD5;
	ssl_prefer_server_ciphers on;

	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header X-Content-Type-Options "nosniff" always;
	# Force HTTPS for a year; browsers refuse any downgrade to http:// afterwards.
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

	# Allow large attachment uploads (Bitwarden item attachments/sends).
	client_max_body_size 128M;

	# --- Recover real client IP from Cloudflare (ranges snapshot 2026-07-22;
	#     refresh from https://www.cloudflare.com/ips-v4 and /ips-v6) ---
	set_real_ip_from 173.245.48.0/20;
	set_real_ip_from 103.21.244.0/22;
	set_real_ip_from 103.22.200.0/22;
	set_real_ip_from 103.31.4.0/22;
	set_real_ip_from 141.101.64.0/18;
	set_real_ip_from 108.162.192.0/18;
	set_real_ip_from 190.93.240.0/20;
	set_real_ip_from 188.114.96.0/20;
	set_real_ip_from 197.234.240.0/22;
	set_real_ip_from 198.41.128.0/17;
	set_real_ip_from 162.158.0.0/15;
	set_real_ip_from 104.16.0.0/13;
	set_real_ip_from 104.24.0.0/14;
	set_real_ip_from 172.64.0.0/13;
	set_real_ip_from 131.0.72.0/22;
	set_real_ip_from 2400:cb00::/32;
	set_real_ip_from 2606:4700::/32;
	set_real_ip_from 2803:f800::/32;
	set_real_ip_from 2405:b500::/32;
	set_real_ip_from 2405:8100::/32;
	set_real_ip_from 2a06:98c0::/29;
	set_real_ip_from 2c0f:f248::/32;
	real_ip_header CF-Connecting-IP;

	# Resolve the upstream at request time via Docker's embedded DNS so nginx
	# still starts (and the other sites stay up) even if vault is down.
	resolver 127.0.0.11 valid=30s;
	set $vw_upstream http://vaultwarden:80;

	# Proxy settings at server scope — inherited by every location below.
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	proxy_set_header X-Real-IP $remote_addr;             # real client after real_ip
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header Upgrade $http_upgrade;               # WebSocket live sync
	proxy_set_header Connection "upgrade";
	proxy_read_timeout 3600s;

	# Admin panel: rate-limited (allow a small burst, then throttle).
	location /admin {
	    limit_req zone=vault_admin burst=5 nodelay;
	    limit_req_status 429;
	    proxy_pass $vw_upstream;
	}

	location / {
	    proxy_pass $vw_upstream;
	}
}
# <<< vaultwarden vhost <<<
