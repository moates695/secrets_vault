# Fail2ban filter for Vaultwarden failed user logins.
# Matches lines like:
#   [2026-01-01 12:00:00.000][vaultwarden::api::identity][ERROR] Username or password is incorrect. Try again. IP: 1.2.3.4. Username: foo@example.com.
[Definition]
failregex = ^.*Username or password is incorrect\. Try again\. IP: <ADDR>\. Username:.*$
ignoreregex =
datepattern = ^\[%%Y-%%m-%%d %%H:%%M:%%S
