services:
  vaultwarden:
    image: vaultwarden/server:1.36.0   # pinned; confirm latest stable on Docker Hub before deploy
    container_name: vaultwarden
    restart: unless-stopped
    # Secrets (ADMIN_TOKEN etc.) are passed via env_file so Docker Compose does
    # NOT interpolate them — this sidesteps the Argon2 "$" -> "$$" escaping trap.
    env_file: .env
    environment:
      # DOMAIN must be a full URL; built from the bare host in .env.
      DOMAIN: "https://${DOMAIN}"
    volumes:
      - ./vw-data:/data
    networks: [ vw-net ]

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    # Only Caddy publishes ports. Vaultwarden is never exposed directly.
    ports:
      - "80:80"
      - "443:443"
    # Passes DOMAIN and ACME_EMAIL into the container for the Caddyfile's
    # {$DOMAIN} / {$ACME_EMAIL} placeholders.
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy-data:/data
      - ./caddy-config:/config
    networks: [ vw-net ]

networks:
  vw-net:
