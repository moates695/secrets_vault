services:
  vaultwarden:
    image: vaultwarden/server:1.36.0   # pinned; confirm latest stable on Docker Hub before deploy
    container_name: vaultwarden
    restart: unless-stopped
    # Secrets (ADMIN_TOKEN etc.) are passed via env_file. NOTE: this host's
    # Compose interpolates env_file values, so the Argon2 ADMIN_TOKEN must have
    # every "$" doubled to "$$" in .env (see .env.example).
    env_file: .env
    environment:
      # DOMAIN must be a full URL; built from the bare host in .env.
      DOMAIN: "https://${DOMAIN}"
    volumes:
      - ./vw-data:/data
    # No published ports: the existing nginx-proxy-prod reaches this container
    # by name over the shared network below. Vaultwarden is never exposed directly.
    networks: [ proxy-net ]

networks:
  # The network that nginx-proxy-prod is attached to, created by the
  # gym_junkie_server compose project. Declared external so we join it
  # rather than creating a new one.
  proxy-net:
    external: true
    name: backend-prod_api-network
